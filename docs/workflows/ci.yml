name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest

      - name: Dry-run sample message
        run: |
          safe-send --message-file sample_messages/hello.txt --output outputs/dry-run-payload.json
          cat outputs/dry-run-payload.json

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v4
        with:
          name: safe-message-sender-dry-run-output
          path: outputs/dry-run-payload.json
