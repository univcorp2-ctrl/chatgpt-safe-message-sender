name: Live Smoke Test

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Single message to send to the OpenAI Responses API"
        required: false
        default: "本番 API の単発疎通テストです。短く返信してください。"
      model:
        description: "OpenAI model"
        required: false
        default: "gpt-4.1-mini"

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run one live smoke request when secret exists
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.model }}
          LIVE_SMOKE_MESSAGE: ${{ github.event.inputs.message }}
        run: python scripts/live_smoke_test.py

      - name: Upload live smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safe-message-sender-live-smoke-output
          path: outputs/live-smoke-response.json
          if-no-files-found: ignore
